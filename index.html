<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel Booking Website</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f2f5f9;
}

/* Navbar */
.navbar {
    background: #0a223d;
    color: white;
    padding: 15px 40px;
    display: flex;
    justify-content: space-between;
}
.navbar h2 {
    margin: 0;
}
.navbar ul {
    list-style: none;
    display: flex;
    gap: 20px;
}
.navbar ul li {
    cursor: pointer;
}

/* Hero Section */
.hero {
    background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') no-repeat center/cover;
    height: 350px;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
}
.hero h1 {
    font-size: 40px;
    background: rgba(0,0,0,0.5);
    padding: 15px;
    border-radius: 10px;
}

/* Search Box */
.search-box {
    background: white;
    margin: -50px auto;
    width: 80%;
    padding: 20px;
    border-radius: 10px;
    display: flex;
    justify-content: space-between;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}
.search-box input, .search-box button {
    padding: 10px;
    font-size: 16px;
}
.search-box button {
    background: #ff5a5f;
    color: white;
    border: none;
    cursor: pointer;
}

/* Cards Section */
.section {
    padding: 40px;
}
.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}
.card {
    background: white;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 3px 8px rgba(0,0,0,0.1);
}
.card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
}
.card h3 {
    padding: 10px;
}
.card p {
    padding: 0 10px 10px;
}

/* Footer */
.footer {
    background: #0a223d;
    color: white;
    text-align: center;
    padding: 20px;
}
</style>

</head>

<body>

<!-- Navbar -->
<div class="navbar">
    <h2>TravelNow</h2>
    <ul>
        <li>Flights</li>
        <li>Hotels</li>
        <li>Packages</li>
        <li>Contact</li>
    </ul>
</div>

<!-- Hero Section -->
<div class="hero">
    <h1>Explore the World with Us</h1>
</div>

<!-- Search Box -->
<div class="search-box">
    <input type="text" placeholder="From">
    <input type="text" placeholder="To">
    <input type="date">
    <button>Search</button>
</div>

<!-- Popular Destinations -->
<div class="section">
    <h2>Popular Destinations</h2>
    <div class="cards">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1524499982521-1ffd58dd89ea">
            <h3>Paris</h3>
            <p>Starting from ₹40,000</p>
        </div>
        <div class="card">
            <img src="https://images.unsplash.com/photo-1505761671935-60b3a7427bad">
            <h3>Dubai</h3>
            <p>Starting from ₹25,000</p>
        </div>
        <div class="card">
            <img src="https://images.unsplash.com/photo-1549887534-3db6b9c03e45">
            <h3>Maldives</h3>
            <p>Starting from ₹60,000</p>
        </div>
    </div>
</div>

<!-- Footer -->
<div class="footer">
    <p>© 2026 TravelNow | All Rights Reserved</p>
</div>

<!-- Watson Chatbot -->
<script>
window.watsonAssistantChatOptions = {
    integrationID: "85dbf216-fe97-4e01-ade4-66cb0286aa3a",
    region: "eu-de",
    serviceInstanceID: "3d18ec9b-8d04-44bf-9d2d-c1e244d1af6e",
    onLoad: async (instance) => { await instance.render(); }
};
setTimeout(function(){
    const t=document.createElement('script');
    t.src="https://web-chat.global.assistant.watson.appdomain.cloud/versions/" 
    + (window.watsonAssistantChatOptions.clientVersion || 'latest') 
    + "/WatsonAssistantChatEntry.js";
    document.head.appendChild(t);
});
</script>

</body>
</html>
