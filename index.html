<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TravelGo - Book Your Trip</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* Navbar */
.navbar {
    display: flex;
    justify-content: space-between;
    padding: 15px 50px;
    background: #0a2239;
    color: white;
}

.navbar h2 {
    margin: 0;
}

.nav-links a {
    color: white;
    margin: 0 15px;
    text-decoration: none;
}

/* Hero Section */
.hero {
    background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') no-repeat center/cover;
    height: 90vh;
    color: white;
    display: flex;
    flex-direction: column;
    justify-content: center;
    text-align: center;
}

.hero h1 {
    font-size: 50px;
}

.search-box {
    margin-top: 20px;
}

.search-box input, .search-box button {
    padding: 10px;
    margin: 5px;
    border: none;
    border-radius: 5px;
}

.search-box button {
    background: orange;
    color: white;
    cursor: pointer;
}

/* Destinations */
.destinations {
    padding: 40px;
    text-align: center;
}

.cards {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
}

.card {
    width: 250px;
    margin: 15px;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

.card img {
    width: 100%;
}

.card h3 {
    padding: 10px;
}

/* Offers */
.offers {
    background: #f4f4f4;
    padding: 40px;
    text-align: center;
}

.offer-box {
    display: inline-block;
    padding: 20px;
    background: white;
    margin: 10px;
    border-radius: 10px;
}

/* Footer */
.footer {
    background: #0a2239;
    color: white;
    text-align: center;
    padding: 20px;
}
</style>

</head>

<body>

<!-- Navbar -->
<div class="navbar">
    <h2>TravelGo</h2>
    <div class="nav-links">
        <a href="#">Flights</a>
        <a href="#">Hotels</a>
        <a href="#">Packages</a>
        <a href="#">Contact</a>
    </div>
</div>

<!-- Hero Section -->
<div class="hero">
    <h1>Explore The World</h1>
    <p>Book Flights, Hotels & Holiday Packages</p>

    <div class="search-box">
        <input type="text" placeholder="From">
        <input type="text" placeholder="To">
        <input type="date">
        <button>Search</button>
    </div>
</div>

<!-- Destinations -->
<div class="destinations">
    <h2>Popular Destinations</h2>

    <div class="cards">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1526779259212-939e64788e3c">
            <h3>Paris</h3>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1505761671935-60b3a7427bad">
            <h3>Dubai</h3>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
            <h3>Goa</h3>
        </div>
    </div>
</div>

<!-- Offers -->
<div class="offers">
    <h2>Best Offers</h2>

    <div class="offer-box">
        <h3>50% Off Flights</h3>
        <p>Limited Time Offer</p>
    </div>

    <div class="offer-box">
        <h3>Hotel Deals</h3>
        <p>Save up to 40%</p>
    </div>
</div>

<!-- Footer -->
<div class="footer">
    <p>© 2026 TravelGo | All Rights Reserved</p>
</div>

</body>
</html>
